name: Deploy Staging

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-staging.yml"

env:
  AZURE_WEBAPP_NAME: shecare-api-staging
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction --without dev

      - name: Pre-deploy import check
        run: poetry run python -c "import app; print('App imports OK')"

      - name: Run Alembic migrations (pre-deploy)
        run: |
          echo "::group::Running pre-deployment pg_dump backup..."
          echo "pg_dump would execute here in production"
          echo "::endgroup::"
          poetry run alembic upgrade head
        env:
          DATABASE__URL: ${{ secrets.STAGING_DATABASE_URL }}
          REDIS__URL: ${{ secrets.STAGING_REDIS_URL }}
          ENVIRONMENT: staging

      - name: Deploy to Azure App Service (staging slot)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend

      - name: Smoke test (staging slot)
        run: |
          curl -f --retry 5 --retry-delay 10 \
            https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net/health/live
          echo "::notice::Staging slot smoke test passed"

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging slot to production
        run: |
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group rg-shecare-staging \
            --slot staging \
            --target-slot production

      - name: Cleanup old deployments
        run: |
          echo "::notice::Retaining last 5 deployment artifacts"
          az webapp deployment list \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group rg-shecare-staging \
            --slot staging \
            --query '[].id' -o tsv \
          | tail -n +6 \
          | while read -r id; do
              az webapp deployment delete --ids "$id" || true
            done
