"""CI pipeline — orchestrates backend-ci, mobile-ci, plus Docker build + push.

Triggers:
  - push to main, develop
  - pull_request to main
"""

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.REGISTRY || 'ghcr.io' }}
  IMAGE_NAME: shecare-backend

jobs:
  backend:
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit

  mobile:
    uses: ./.github/workflows/mobile-ci.yml
    secrets: inherit

  build:
    needs: backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and tag API image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME:latest \
            -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            .
      - name: Build and tag worker image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME-worker:latest \
            -t $REGISTRY/$IMAGE_NAME-worker:${{ github.sha }} \
            -f Dockerfile.worker .
      - name: Push images
        run: |
          docker push $REGISTRY/$IMAGE_NAME:latest
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME-worker:latest
          docker push $REGISTRY/$IMAGE_NAME-worker:${{ github.sha }}

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        run: |
          echo "::notice::Production deploy — trigger Azure App Service deployment"
