"""CI pipeline — ruff, pytest, build, push, deploy (plan 01 §5).

Triggers:
  - push to main, develop
  - pull_request to main

Steps:
  1. Lint (ruff)
  2. Type-check (mypy)
  3. Test (pytest with coverage)
  4. Build & push Docker image
  5. Deploy to ECS (staging only)
"""

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"
  REGISTRY: ${{ secrets.ECR_REGISTRY || 'ghcr.io' }}
  IMAGE_NAME: shecare-backend

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Check formatting (black)
        run: poetry run black --check app tests
      - name: Check imports (isort)
        run: poetry run isort --check-only app tests
      - name: Lint (ruff)
        run: poetry run ruff check app tests
      - name: Type-check (mypy)
        run: poetry run mypy app tests

  test:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: shecare
          POSTGRES_PASSWORD: shecare
          POSTGRES_DB: shecare
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U shecare
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd redis-cli ping
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Apply migrations
        run: poetry run alembic upgrade head
        env:
          DATABASE__URL: postgresql+asyncpg://shecare:shecare@localhost:5432/shecare
          REDIS__URL: redis://localhost:6379/0
      - name: Run tests with coverage
        run: poetry run pytest --cov=app --cov-report=term-missing --cov-fail-under=80
        env:
          DATABASE__URL: postgresql+asyncpg://shecare:shecare@localhost:5432/shecare
          REDIS__URL: redis://localhost:6379/0
          ENVIRONMENT: test
          JWT__SECRET_KEY: test-secret-key
          JWT__REFRESH_SECRET_KEY: test-refresh-secret
          ENCRYPTION__MASTER_KEY: dGVzdC1mZXJuZXQta2V5LWZvci1jaS1vbmx5LTEyMzQ=
          TWILIO__ACCOUNT_SID: mock
          TWILIO__AUTH_TOKEN: mock

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and tag API image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:latest -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .
      - name: Build and tag worker image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME-worker:latest -t $REGISTRY/$IMAGE_NAME-worker:${{ github.sha }} -f Dockerfile.worker .
      - name: Push images
        run: |
          docker push $REGISTRY/$IMAGE_NAME:latest
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME-worker:latest
          docker push $REGISTRY/$IMAGE_NAME-worker:${{ github.sha }}

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ECS
        run: |
          echo "Deploy step — replace with actual ECS deploy command."
          echo "Example: aws ecs update-service --cluster shecare --service api --force-new-deployment"
